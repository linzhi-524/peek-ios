# Render Blueprint for 掌心窗 Palm Window MCP · iOS Lite
#
# This creates two Free web services:
# 1) peek-ios-server: Python phone/iOS backend
# 2) peek-ios-mcp: Node MCP gateway for ChatGPT / MCP clients
#
# iOS Shortcuts Server URL: https://<peek-ios-server>.onrender.com
# MCP URL:                  https://<peek-ios-mcp>.onrender.com/mcp
# Legacy SSE URL:           https://<peek-ios-mcp>.onrender.com/sse

services:
  - type: web
    name: peek-ios-server
    runtime: python
    plan: free
    rootDir: server
    buildCommand: "echo ok"
    startCommand: "python linjian_server.py"
    healthCheckPath: /health
    envVars:
      - key: LINJIAN_TOKEN
        generateValue: true
      - key: LINJIAN_KEEP
        value: "3"
      - key: LINJIAN_DEFAULT_DEVICE
        value: ios-phone

  - type: web
    name: peek-ios-mcp
    runtime: node
    plan: free
    rootDir: mcp
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: /health
    envVars:
      - key: LINJIAN_URL
        fromService:
          name: peek-ios-server
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: LINJIAN_TOKEN
        fromService:
          name: peek-ios-server
          type: web
          envVarKey: LINJIAN_TOKEN
      - key: LINJIAN_DEFAULT_DEVICE
        value: ios-phone
